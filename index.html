<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚔️ Bot Army — Viking Ops</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0f; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #0e0e1a, #1a1a2e);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 22px 28px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  header h1 {
    font-family: 'Cinzel', serif;
    font-size: 1.5rem;
    background: linear-gradient(90deg, #c8973a, #ff6b35);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  header .sub { color: #555; font-size: 0.8rem; margin-top: 2px; }

  .back-btn {
    position: fixed; top: 14px; left: 14px; z-index: 9999;
    display: flex; align-items: center; gap: 8px;
    background: rgba(10,8,4,0.85); border: 1px solid #c06020;
    border-radius: 8px; padding: 7px 14px; text-decoration: none;
    font-family: Georgia, serif; font-size: 0.78rem; font-weight: 700;
    color: #c8973a; letter-spacing: 0.08em; backdrop-filter: blur(6px);
    transition: all 0.2s;
  }
  .back-btn:hover { border-color: #ff9040; color: #ffd080; }

  .summary {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    padding: 24px 28px 0;
  }
  .stat-card {
    background: #12121a;
    border: 1px solid #1e1e2e;
    border-radius: 10px;
    padding: 18px;
    text-align: center;
  }
  .stat-card .label { color: #666; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .stat-card .value { font-size: 2.2rem; font-weight: 700; }
  .stat-card .sub { color: #555; font-size: 0.75rem; margin-top: 4px; }

  .section { padding: 24px 28px; }
  .section-title {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid #1a1a2e;
  }

  .cron-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 12px;
  }

  .cron-card {
    background: #12121a;
    border: 1px solid #1e1e2e;
    border-radius: 10px;
    padding: 14px 16px;
    border-left: 4px solid transparent;
    transition: border-color 0.2s;
  }
  .cron-card.ok    { border-left-color: #22c55e; }
  .cron-card.error { border-left-color: #ef4444; }
  .cron-card.warn  { border-left-color: #f59e0b; }

  .cron-name { font-weight: 700; font-size: 0.9rem; margin-bottom: 6px; }
  .cron-meta { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }
  .tag {
    font-size: 0.68rem;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .tag-ok    { background: rgba(34,197,94,0.12);  color: #22c55e; }
  .tag-error { background: rgba(239,68,68,0.12);  color: #ef4444; }
  .tag-model { background: rgba(99,102,241,0.12); color: #818cf8; }
  .tag-sched { background: rgba(255,255,255,0.06); color: #888; }

  .cron-times { font-size: 0.72rem; color: #555; display: flex; justify-content: space-between; }
  .cron-times span { display: flex; align-items: center; gap: 4px; }

  .error-streak { color: #ef4444; font-size: 0.72rem; margin-top: 4px; font-weight: 600; }

  .updated { text-align: center; color: #333; font-size: 0.72rem; padding: 20px; }

  /* model badge colors */
  .haiku  { background: rgba(16,185,129,0.12); color: #10b981; }
  .sonnet { background: rgba(139,92,246,0.12);  color: #8b5cf6; }
  .opus   { background: rgba(239,68,68,0.12);   color: #ef4444; }
</style>
</head>
<body>

<a href="https://vikingsam.github.io/hq/" class="back-btn">🛡 Portal</a>

<header>
  <div>
    <h1>⚔️ Bot Army Operations</h1>
    <div class="sub">Live cron status · Last refreshed: <span id="ts"></span></div>
  </div>
</header>

<div class="summary" id="summary"></div>

<div class="section">
  <div class="section-title">🔴 Needs Attention</div>
  <div class="cron-grid" id="errors"></div>
</div>

<div class="section">
  <div class="section-title">✅ Running Clean</div>
  <div class="cron-grid" id="healthy"></div>
</div>

<div class="updated">Data baked at build time · Rebuild dashboard to refresh</div>

<script>
const JOBS = [
  {"name":"email-2hr-check-both-accounts","enabled":true,"schedule":"Every 2h (6am-10pm)","model":"haiku","lastStatus":"error","lastRun":1774872000012,"nextRun":1774879200000,"errors":2,"duration":111063},
  {"name":"atm-monitor-hourly","enabled":true,"schedule":"Hourly (10am-10pm)","model":"haiku","lastStatus":"error","lastRun":1774872150122,"nextRun":1774875600000,"errors":1,"duration":23447},
  {"name":"blade-email-3x-daily","enabled":true,"schedule":"12/4/8pm daily","model":"haiku","lastStatus":"error","lastRun":1774872111075,"nextRun":1774886400000,"errors":1,"duration":39047},
  {"name":"crypto-bounce-watch","enabled":true,"schedule":"Hourly (10am-10pm)","model":"haiku","lastStatus":"error","lastRun":1774872543251,"nextRun":1774876203297,"errors":67,"duration":60046},
  {"name":"morning-briefing","enabled":true,"schedule":"7am Central daily","model":"sonnet","lastStatus":"error","lastRun":1774789227403,"nextRun":1774875600000,"errors":8,"duration":228704},
  {"name":"3commas-daily-report","enabled":true,"schedule":"7am Central daily","model":"haiku","lastStatus":"error","lastRun":1774789200008,"nextRun":1774875600000,"errors":4,"duration":27395},
  {"name":"radius-daily-check","enabled":true,"schedule":"7:30am Central daily","model":"haiku","lastStatus":"error","lastRun":1774791000007,"nextRun":1774877400000,"errors":3,"duration":149520},
  {"name":"daily-learning-brief","enabled":true,"schedule":"9am Central daily","model":"haiku","lastStatus":"error","lastRun":1774796400008,"nextRun":1774882800000,"errors":14,"duration":156755},
  {"name":"adwords-morning-check","enabled":true,"schedule":"10am Central weekdays","model":"haiku","lastStatus":"error","lastRun":1774627304702,"nextRun":1774886400000,"errors":2,"duration":50090},
  {"name":"daily-lead-report","enabled":true,"schedule":"6am Central Tue-Sat","model":"haiku","lastStatus":"error","lastRun":1774699369500,"nextRun":1774958400000,"errors":1,"duration":900091},
  {"name":"fr44-data-pull-2am","enabled":true,"schedule":"4am Central daily","model":"sonnet","lastStatus":"error","lastRun":1774861200010,"nextRun":1774947600000,"errors":2,"duration":12997},
  {"name":"daily-6am-report","enabled":true,"schedule":"6am Central daily","model":"sonnet","lastStatus":"error","lastRun":1774868400010,"nextRun":1774954800000,"errors":1,"duration":53722},
  {"name":"daily-memory-init","enabled":true,"schedule":"Midnight Central","model":"sonnet","lastStatus":"error","lastRun":1774846800009,"nextRun":1774933200000,"errors":1,"duration":11191},
  {"name":"sync-transcripts-daily","enabled":true,"schedule":"12:05am Central","model":"sonnet","lastStatus":"error","lastRun":1774847100008,"nextRun":1774933500000,"errors":1,"duration":23960},
  {"name":"weekly-memory-cleanup","enabled":true,"schedule":"Sundays 8am Central","model":"haiku","lastStatus":"error","lastRun":1774792800008,"nextRun":1775397600000,"errors":3,"duration":304768},
  {"name":"em-email-3x-daily","enabled":true,"schedule":"7am/11am/3pm Central","model":"haiku","lastStatus":"ok","lastRun":1774818000008,"nextRun":1774875600000,"errors":0,"duration":39675},
  {"name":"token-dashboard-6am","enabled":true,"schedule":"6am Central daily","model":"haiku","lastStatus":"ok","lastRun":1774868470313,"nextRun":1774954800000,"errors":0,"duration":369527},
  {"name":"token-dashboard-noon","enabled":true,"schedule":"Noon Central daily","model":"haiku","lastStatus":"ok","lastRun":1774803600008,"nextRun":1774890000000,"errors":0,"duration":334519},
  {"name":"token-dashboard-5pm","enabled":true,"schedule":"5pm Central daily","model":"haiku","lastStatus":"ok","lastRun":1774821690879,"nextRun":1774908000000,"errors":0,"duration":255722},
  {"name":"token-dashboard-1230am","enabled":true,"schedule":"12:30am Central","model":"haiku","lastStatus":"ok","lastRun":1774852200007,"nextRun":1774938600000,"errors":0,"duration":320479},
  {"name":"blade-daily-backup","enabled":true,"schedule":"6am Central daily","model":"haiku","lastStatus":"ok","lastRun":1774868453732,"nextRun":1774954800000,"errors":0,"duration":16581},
  {"name":"saturday-books-reminder","enabled":true,"schedule":"Saturdays 9am Central","model":"haiku","lastStatus":"ok","lastRun":1774706555739,"nextRun":1775311200000,"errors":0,"duration":4662}
];

function fmt(ms) {
  if (!ms) return '—';
  const d = new Date(ms);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' ' + d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});
}
function dur(ms) {
  if (!ms) return '';
  if (ms < 60000) return (ms/1000).toFixed(0)+'s';
  return (ms/60000).toFixed(1)+'m';
}
function modelClass(m) {
  if (!m) return '';
  if (m.includes('haiku')) return 'haiku';
  if (m.includes('sonnet')) return 'sonnet';
  if (m.includes('opus')) return 'opus';
  return '';
}
function modelLabel(m) {
  if (!m) return '?';
  if (m.includes('haiku')) return 'haiku';
  if (m.includes('sonnet')) return 'sonnet';
  if (m.includes('opus')) return 'opus';
  return m.split('/').pop();
}

document.getElementById('ts').textContent = new Date().toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});

const errors = JOBS.filter(j => j.lastStatus !== 'ok' || j.errors > 0);
const healthy = JOBS.filter(j => j.lastStatus === 'ok' && j.errors === 0);

// Summary
const totalErrors = errors.length;
const totalHealthy = healthy.length;
const worstStreak = Math.max(...JOBS.map(j=>j.errors));
document.getElementById('summary').innerHTML = `
  <div class="stat-card">
    <div class="label">Total Bots</div>
    <div class="value">${JOBS.length}</div>
    <div class="sub">active cron jobs</div>
  </div>
  <div class="stat-card">
    <div class="label">Running Clean</div>
    <div class="value" style="color:#22c55e">${totalHealthy}</div>
    <div class="sub">no errors</div>
  </div>
  <div class="stat-card">
    <div class="label">Needs Attention</div>
    <div class="value" style="color:#ef4444">${totalErrors}</div>
    <div class="sub">erroring or degraded</div>
  </div>
  <div class="stat-card">
    <div class="label">Worst Streak</div>
    <div class="value" style="color:${worstStreak>10?'#ef4444':worstStreak>3?'#f59e0b':'#888'}">${worstStreak}</div>
    <div class="sub">consecutive errors</div>
  </div>
`;

function cardHtml(j) {
  const status = j.lastStatus === 'ok' && j.errors === 0 ? 'ok' : j.errors > 5 ? 'error' : 'warn';
  const statusTag = j.lastStatus === 'ok' ? `<span class="tag tag-ok">✓ OK</span>` : `<span class="tag tag-error">✗ ${j.lastStatus||'unknown'}</span>`;
  const errLine = j.errors > 0 ? `<div class="error-streak">⚠️ ${j.errors} consecutive error${j.errors>1?'s':''}</div>` : '';
  return `<div class="cron-card ${status}">
    <div class="cron-name">${j.name}</div>
    <div class="cron-meta">
      ${statusTag}
      <span class="tag tag-model ${modelClass(j.model)}">${modelLabel(j.model)}</span>
      <span class="tag tag-sched">⏱ ${j.schedule}</span>
    </div>
    ${errLine}
    <div class="cron-times">
      <span>Last: ${fmt(j.lastRun)} ${j.duration ? '('+dur(j.duration)+')':''}</span>
      <span>Next: ${fmt(j.nextRun)}</span>
    </div>
  </div>`;
}

document.getElementById('errors').innerHTML = errors.map(cardHtml).join('');
document.getElementById('healthy').innerHTML = healthy.map(cardHtml).join('');
</script>
</body>
</html>
